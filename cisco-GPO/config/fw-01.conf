!
version 15.7
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname FW-01
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
!
ip cef
no ipv6 cef
!
interface GigabitEthernet0/0
 ip address dhcp
 ip nat outside
 ip virtual-reassembly in
 duplex auto
 speed auto
 media-type rj45
!
interface GigabitEthernet0/1
 ip address 10.0.99.2 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 duplex auto
 speed auto
 media-type rj45
!
router bgp 65400
 bgp log-neighbor-changes
 neighbor 10.0.99.1 remote-as 65000
 !
 address-family ipv4
  neighbor 10.0.99.1 activate
  neighbor 10.0.99.1 default-originate
 exit-address-family
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
ip nat inside source list NAT-LIST interface GigabitEthernet0/0 overload
!
ip access-list extended NAT-LIST
 permit ip 10.0.0.0 0.255.255.255 any
!
ipv6 ioam timestamp
!
!
!
control-plane
!
line con 0
line aux 0
line vty 0 4
 login
 transport input none
!
no scheduler allocate
!
end
