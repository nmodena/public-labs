ip domain-lookup
copp profile strict
snmp-server user admin network-admin auth md5 53349260DB97C5F65BC2C23427892D51E6F6 priv aes-128 321DF354E5F2F8B675BFA77713FC4A7A375B localizedV2key
rmon event 1 log trap public description FATAL(1) owner PMON@FATAL
